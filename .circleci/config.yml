# For a detailed guide to building and testing on iOS, read the docs:
# https://circleci.com/docs/2.0/testing-ios/
version: 2.1

workflows:
  default:
    jobs:
      - build:
          matrix:
            parameters:
              xcode: ["13.4.1", "14.3.1"]
          filters:
            tags:
              only: /.*/
      - prepare_release:
          xcode: "14.3.1"
          filters:
            tags:
              only: /.*/

jobs:
  build:
    parameters:
      xcode:
        type: string
    macos:
      xcode: << parameters.xcode >>
    steps:
      - run:
          name: Allow cloning from github.com via HTTPS
          command: | 
            git config --global url."https://github.com/".insteadOf git@github.com:
            git config --global url."https://".insteadOf git://
      - checkout
      - run:
          name: Ensure netrc
          command: Tests/Integration/ensure_netrc.sh
      - run:
          name: Test
          command: xcodebuild -project MapboxMobileEvents.xcodeproj -scheme MMETestHost build-for-testing test-without-building -destination 'platform=iOS Simulator,name=iPhone 13,OS=15.5' GCC_INSTRUMENT_PROGRAM_FLOW_ARCS=YES GCC_GENERATE_TEST_COVERAGE_FILES=YES CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
  prepare_release:
    parameters:
      xcode:
        type: string
    macos:
      xcode: << parameters.xcode >>
    steps:
      - run:
          name: Allow cloning from github.com via HTTPS
          command: | 
            git config --global url."https://github.com/".insteadOf git@github.com:
            git config --global url."https://".insteadOf git://
      - checkout
      - run:
          name: Ensure netrc
          command: Tests/Integration/ensure_netrc.sh
      - run:
          name: Prepare release artifacts
          command: |
            scripts/prepare_release_artifacts.sh
      - run:
          name: Calculate checksum of Mapbox.zip
          command: |
              pushd build/artifacts/zip
              swift package compute-checksum MapboxMobileEvents.zip > MapboxMobileEvents.zip.checksum
              cat MapboxMobileEvents.zip.checksum
              popd
      - run:
          name: Test CocoaPods
          command: |
            Tests/Integration/test_cocoapods.sh
      - run:
          name: Test SPMXcode
          command: |
            Tests/Integration/test_spm_xcode.sh
      - store_artifacts:
          path: build/artifacts/zip
